<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Tour Details</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" *ngIf="tour">

  <h2>Tour #{{ tour.id }}</h2>
  <h3>{{ tour.title }}</h3>
  <p>{{ tour.body }}</p>

  <ion-button routerLink="/tours" expand="block">
    Back to Tours
  </ion-button>

  <ion-button (click)="toggleFavorite()" expand="block">
    {{ isFav ? 'Remove from Favorites' : 'Add to Favorites' }}
  </ion-button>

  <ion-button routerLink="/favorites" expand="block">
    View Favorites
  </ion-button>

</ion-content>
