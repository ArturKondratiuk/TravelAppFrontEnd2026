<ion-header>
  <ion-toolbar>
    <ion-title>Available Tours</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item *ngFor="let tour of tours" [routerLink]="['/tour-details', tour.id]">
      <ion-label>
        <h2>Tour #{{ tour.id }}</h2>
        <p>{{ tour.title }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
