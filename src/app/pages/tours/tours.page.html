<ion-header>
  <ion-toolbar>
    <ion-title>Explore Tours</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-grid class="ion-padding">

    <ion-row style="margin-bottom: 20px;">

      <ion-col size="4">
        <ion-button routerLink="/favorites" expand="block" color="tertiary">
          <span style="color: black;">View Favorites</span>
        </ion-button>
      </ion-col>

      <ion-col size="4" class="ion-text-center">
        <ion-button (click)="getLocation()" expand="block" color="light">
          <span style="color: black;">Get Location</span>
        </ion-button>
      </ion-col>

      <ion-col size="4" class="ion-text-right">
        <ion-button (click)="showLocation = !showLocation" expand="block" fill="outline">
          <span style="color: black;">
            {{ showLocation ? 'Hide Location' : 'Show Location' }}
          </span>
        </ion-button>
      </ion-col>

    </ion-row>


    <div *ngIf="location && showLocation" style="text-align: center; margin-top: 10px;">
      <p><strong>Latitude:</strong> {{ location.lat }}</p>
      <p><strong>Longitude:</strong> {{ location.lng }}</p>
      <ion-badge color="success">Saved</ion-badge>
    </div>

    <br>
    <ion-card *ngFor="let tour of tours" style="margin-bottom: 20px; display: block;">

      <img [src]="tour.image" style="width: 100%; height: 180px; object-fit: cover; border-radius: 8px 8px 0 0;">

      <ion-card-header>
        <ion-card-title style="font-size: 20px;">
          Tour #{{ tour.id }}: {{ tour.customTitle }}
        </ion-card-title>
      </ion-card-header>
      <br>
      <ion-button size="small" expand="block" fill="outline" [routerLink]="['/tour-details', tour.id]">
        <span style="color: black;">View Details</span>
      </ion-button>

    </ion-card>

    <br>
    <ion-row>
      <ion-col size="12">
        <ion-card style="margin-top: 25px; padding-bottom: 10px;">

          <ion-card-header>
            <ion-card-title style="font-size: 30px;">
              Book a Tour
            </ion-card-title>
          </ion-card-header>

          <ion-card-content>

            <ion-item style="margin-bottom: 12px;">
              <ion-label position="stacked">Name</ion-label>
              <ion-input [(ngModel)]="booking.name" name="name"></ion-input>
            </ion-item>

            <ion-item style="margin-bottom: 12px;">
              <ion-label position="stacked">Email</ion-label>
              <ion-input [(ngModel)]="booking.email" name="email"></ion-input>
            </ion-item>

            <ion-item style="margin-bottom: 16px;">
              <ion-label position="stacked">Tour ID</ion-label>
              <ion-input [(ngModel)]="booking.tourId" name="tourId"></ion-input>
            </ion-item>
            <br>
            <ion-button (click)="submitForm()" expand="block" size="large">
              <span style="color: black;">Book Now</span>
            </ion-button>

          </ion-card-content>

        </ion-card>
      </ion-col>
    </ion-row>

  </ion-grid>

</ion-content>
