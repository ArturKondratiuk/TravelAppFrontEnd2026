<ion-header>
  <ion-toolbar>
    <ion-title>Tour Details</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" *ngIf="tour">

  <ion-card>

    <img [src]="tour.image" style="width: 100%; height: 220px; object-fit: cover; border-radius: 8px 8px 0 0;">

    <ion-card-header>
      <ion-card-title style="font-size: 22px;">
        Tour #{{ tour.id }}: {{ tour.customTitle }}
      </ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <p style="font-size: 16px; line-height: 1.5; margin-bottom: 20px;">
        {{ tour.body }}
      </p>

      <ion-button expand="block" (click)="toggleFavorite()">
        <span style="color: black;">{{ isFav ? 'Remove from Favorites' : 'Add to Favorites' }}</span>
      </ion-button>

    </ion-card-content>

  </ion-card>
  <br><br>
  <ion-col size="6" style="padding-right: 6px;">
    <ion-button routerLink="/tours" expand="block" fill="outline">
      Back
    </ion-button>
  </ion-col>

  <ion-col size="6" style="padding-left: 6px;">
    <ion-button routerLink="/favorites" expand="block">
      Favorites
    </ion-button>
  </ion-col>

</ion-content>
