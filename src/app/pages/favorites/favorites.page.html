<ion-header>
  <ion-toolbar>
    <ion-title>Favorites</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item *ngFor="let tour of favorites">
      <ion-label>
        <h2>Tour #{{ tour.id }}</h2>
        <p>{{ tour.title }}</p>
      </ion-label>

      <ion-button color="danger" (click)="remove(tour)">
        Remove
      </ion-button>
    </ion-item>
  </ion-list>

</ion-content>
